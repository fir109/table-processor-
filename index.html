<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出勤数据分析工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 60px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
        }
        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }
        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8eaff;
            transform: scale(1.02);
        }
        .upload-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        .upload-text {
            color: #666;
            font-size: 18px;
        }
        .upload-hint {
            color: #999;
            font-size: 14px;
            margin-top: 10px;
        }
        .settings {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
            align-items: center;
        }
        .setting-item {
            flex: 1;
            min-width: 200px;
        }
        .setting-item label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        .setting-item input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .setting-item input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px 5px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-secondary {
            background: #6c757d;
        }
        .btn-secondary:hover {
            box-shadow: 0 10px 30px rgba(108, 117, 125, 0.4);
        }
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px 8px;
            text-align: center;
        }
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            position: sticky;
            top: 0;
        }
        th.sort-header {
            padding: 8px;
        }
        .th-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .th-title {
            font-size: 14px;
        }
        .sort-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .sort-btn:hover {
            background: rgba(255,255,255,0.4);
        }
        .sort-btn.active {
            background: #fff;
            color: #667eea;
        }
        tr:nth-child(even) {
            background: #f8f9ff;
        }
        tr:hover {
            background: #e8eaff;
        }
        .highlight-low {
            background-color: #ffcccc !important;
            color: #c00;
            font-weight: 600;
        }
        .highlight-zero {
            background-color: #ff9999 !important;
            color: #900;
            font-weight: 700;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-value {
            font-size: 32px;
            font-weight: 700;
        }
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 5px;
        }
        .legend {
            display: flex;
            gap: 20px;
            margin: 15px 0;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 8px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .legend-color {
            width: 24px;
            height: 24px;
            border-radius: 4px;
        }
        .legend-low {
            background: #ffcccc;
            border: 2px solid #c00;
        }
        .legend-zero {
            background: #ff9999;
            border: 2px solid #900;
        }
        #fileInput {
            display: none;
        }
        .hidden {
            display: none;
        }
        .actions {
            text-align: center;
            margin-top: 20px;
        }
        .row-name {
            text-align: left !important;
            max-width: 200px;
            word-break: break-word;
        }
        .info-text {
            color: #666;
            font-size: 14px;
            margin: 15px 0;
            padding: 12px;
            background: #f8f9ff;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📊 出勤数据分析工具</h1>
            
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <div class="upload-text">点击或拖拽上传 Excel 文件</div>
                <div class="upload-hint">支持 .xlsx, .xls 格式</div>
            </div>
            <input type="file" id="fileInput" accept=".xlsx,.xls">
            
            <div class="settings hidden" id="settings">
                <div class="setting-item">
                    <label>低于多少分钟高亮（默认90）</label>
                    <input type="number" id="thresholdInput" value="90" min="0">
                </div>
            </div>
            
            <div class="info-text hidden" id="infoText">
                💡 点击每列标题下的"排序"按钮可对该列单独从高到低排序
            </div>
            
            <div class="actions hidden" id="actions">
                <button class="btn" id="processBtn">🔄 全量排序</button>
                <button class="btn btn-secondary" id="downloadBtn">📥 下载结果</button>
            </div>
        </div>
        
        <div class="card hidden" id="statsCard">
            <h2 style="margin-bottom: 15px;">📈 统计概览</h2>
            <div class="stats" id="stats"></div>
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color legend-low"></div>
                    <span>低于阈值（可自定义）</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color legend-zero"></div>
                    <span>零出勤</span>
                </div>
            </div>
        </div>
        
        <div class="card hidden" id="tableCard">
            <h2 style="margin-bottom: 15px;">📋 处理结果</h2>
            <div class="table-container">
                <table id="resultTable"></table>
            </div>
        </div>
    </div>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script>
        let workbook = null;
        let originalData = null;
        let currentData = null;
        let sortStates = {};
        
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const settings = document.getElementById('settings');
        const actions = document.getElementById('actions');
        const statsCard = document.getElementById('statsCard');
        const tableCard = document.getElementById('tableCard');
        const thresholdInput = document.getElementById('thresholdInput');
        const processBtn = document.getElementById('processBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const stats = document.getElementById('stats');
        const resultTable = document.getElementById('resultTable');
        const infoText = document.getElementById('infoText');

        // Drag and drop
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                workbook = XLSX.read(e.target.result, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const rawData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                
                // 找到表头行，过滤出目标列：第0列（昵称）+ 含"听课"关键词的列
                const header = rawData[0] || [];
                const keepCols = [];
                for (let i = 0; i < header.length; i++) {
                    const h = String(header[i] || '');
                    if (i === 0 || h.includes('听课')) {
                        keepCols.push(i);
                    }
                }
                
                // 只保留目标列
                const filtered = rawData.map(row => keepCols.map(ci => row[ci] !== undefined ? row[ci] : ''));
                
                // 为每行追加总时长列
                originalData = filtered.map((row, idx) => {
                    if (idx === 0) {
                        return [...row, '总时长'];
                    } else {
                        let sum = 0;
                        for (let i = 1; i < row.length; i++) {
                            sum += parseFloat(row[i]) || 0;
                        }
                        return [...row, sum];
                    }
                });
                
                currentData = JSON.parse(JSON.stringify(originalData));
                
                // 初始化排序状态
                sortStates = {};
                
                uploadArea.innerHTML = `<div class="upload-icon">✅</div>
                    <div class="upload-text">已加载: ${file.name}</div>
                    <div class="upload-hint">${originalData.length} 行 × ${originalData[0].length} 列</div>`;
                
                settings.classList.remove('hidden');
                infoText.classList.remove('hidden');
                actions.classList.remove('hidden');
                statsCard.classList.add('hidden');
                tableCard.classList.add('hidden');
            };
            reader.readAsArrayBuffer(file);
        }

        processBtn.addEventListener('click', processAllData);
        downloadBtn.addEventListener('click', downloadFile);

        function processAllData() {
            if (!originalData) return;
            
            const threshold = parseInt(thresholdInput.value) || 90;
            
            // 重置数据
            currentData = JSON.parse(JSON.stringify(originalData));
            sortStates = {};
            
            // 对所有列排序（从高到低）
            for (let col = 1; col < currentData[0].length; col++) {
                sortByColumn(col, false);
            }
            
            // 重新计算总时长
            const dataCols = currentData[0].length - 1;
            for (let i = 1; i < currentData.length; i++) {
                let sum = 0;
                for (let j = 1; j < dataCols; j++) {
                    sum += parseFloat(currentData[i][j]) || 0;
                }
                currentData[i][dataCols] = sum;
            }
            
            renderTable();
        }

        function sortByColumn(colIndex, toggle = true) {
            if (!currentData || currentData.length < 2) return;
            
            const header = currentData[0];
            const rows = currentData.slice(1);
            
            // 如果 toggle=true，点击时切换升序/降序；否则默认降序
            if (toggle) {
                if (sortStates[colIndex] === 'desc') {
                    // 升序
                    rows.sort((a, b) => (parseFloat(a[colIndex]) || 0) - (parseFloat(b[colIndex]) || 0));
                    sortStates[colIndex] = 'asc';
                } else {
                    // 降序
                    rows.sort((a, b) => (parseFloat(b[colIndex]) || 0) - (parseFloat(a[colIndex]) || 0));
                    sortStates[colIndex] = 'desc';
                }
            } else {
                // 降序
                rows.sort((a, b) => (parseFloat(b[colIndex]) || 0) - (parseFloat(a[colIndex]) || 0));
                sortStates[colIndex] = 'desc';
            }
            
            currentData = [header, ...rows];
            
            // 重新计算总时长（因为排序后顺序变了）
            if (colIndex === header.length - 1) {
                // 如果是对总时长列排序，需要重新计算
                const dataCols = header.length - 1; // 数据列数（不含昵称和总时长）
                for (let i = 1; i < currentData.length; i++) {
                    let sum = 0;
                    for (let j = 1; j <= dataCols; j++) {
                        sum += parseFloat(currentData[i][j]) || 0;
                    }
                    currentData[i][header.length - 1] = sum;
                }
            }
            
            renderTable();
        }

        function renderTable() {
            const threshold = parseInt(thresholdInput.value) || 90;
            const data = currentData;
            
            // 计算统计
            let totalCells = 0;
            let belowThreshold = 0;
            let zeroCount = 0;
            
            for (let col = 1; col < data[0].length; col++) {
                for (let row = 1; row < data.length; row++) {
                    const val = parseFloat(data[row][col]) || 0;
                    totalCells++;
                    if (val > 0 && val < threshold) belowThreshold++;
                    if (val === 0) zeroCount++;
                }
            }
            
            // 更新统计卡片
            stats.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${totalCells}</div>
                    <div class="stat-label">总出勤记录</div>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                    <div class="stat-value">${belowThreshold}</div>
                    <div class="stat-label">未达标（<${threshold}分钟）</div>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);">
                    <div class="stat-value">${zeroCount}</div>
                    <div class="stat-label">零出勤</div>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);">
                    <div class="stat-value">${((totalCells - belowThreshold - zeroCount) / totalCells * 100).toFixed(1)}%</div>
                    <div class="stat-label">达标率</div>
                </div>
            `;
            statsCard.classList.remove('hidden');
            
            // 生成表头（带排序按钮）
            let html = '<thead><tr>';
            for (let col = 0; col < data[0].length; col++) {
                const state = sortStates[col];
                const arrow = state === 'asc' ? ' ↑' : (state === 'desc' ? ' ↓' : '');
                const activeClass = state ? 'active' : '';
                
                if (col === 0) {
                    html += `<th>${data[0][col] || ''}</th>`;
                } else if (col === data[0].length - 1) {
                    // 总时长列
                    html += `<th class="sort-header">
                        <div class="th-content">
                            <span class="th-title">${data[0][col] || ''}</span>
                            <button class="sort-btn ${activeClass}" onclick="sortByColumn(${col}, true)">
                                排序${arrow}
                            </button>
                        </div>
                    </th>`;
                } else {
                    html += `<th class="sort-header">
                        <div class="th-content">
                            <span class="th-title">${data[0][col] || ''}</span>
                            <button class="sort-btn ${activeClass}" onclick="sortByColumn(${col}, true)">
                                排序${arrow}
                            </button>
                        </div>
                    </th>`;
                }
            }
            html += '</tr></thead><tbody>';
            
            // 生成数据行
            for (let row = 1; row < data.length; row++) {
                html += '<tr>';
                for (let col = 0; col < data[row].length; col++) {
                    const val = parseFloat(data[row][col]) || 0;
                    let className = '';
                    
                    if (col === 0) {
                        className = 'row-name';
                    } else if (col === data[row].length - 1) {
                        // 总时长列 - 使用特殊样式
                        if (val === 0) {
                            className = 'highlight-zero';
                        } else if (val < threshold * (data[0].length - 2)) {
                            className = 'highlight-low';
                        }
                    } else {
                        if (val === 0) {
                            className = 'highlight-zero';
                        } else if (val < threshold) {
                            className = 'highlight-low';
                        }
                    }
                    
                    html += `<td class="${className}">${data[row][col] !== undefined ? data[row][col] : ''}</td>`;
                }
                html += '</tr>';
            }
            html += '</tbody>';
            resultTable.innerHTML = html;
            tableCard.classList.remove('hidden');
            
            // 保存处理后的数据用于下载
            window.processedData = currentData;
        }

        function downloadFile() {
            if (!currentData) return;
            
            const threshold = parseInt(thresholdInput.value) || 90;
            const data = JSON.parse(JSON.stringify(currentData));
            
            // 创建工作簿
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(data);
            
            // 设置高亮样式（通过背景色）
            const range = XLSX.utils.decode_range(ws['!ref']);
            
            // 遍历每个数据单元格设置样式
            for (let R = range.s.r + 1; R <= range.e.r; R++) {
                for (let C = range.s.c + 1; C <= range.e.c; C++) {
                    const cell = ws[XLSX.utils.encode_cell({r: R, c: C})];
                    if (cell && cell.v !== undefined) {
                        const val = parseFloat(cell.v) || 0;
                        if (val === 0) {
                            cell.s = { fill: { fgColor: { rgb: "FF9999" } } };
                        } else if (val < threshold) {
                            cell.s = { fill: { fgColor: { rgb: "FFCCCC" } } };
                        }
                    }
                }
            }
            
            XLSX.utils.book_append_sheet(wb, ws, '出勤分析');
            XLSX.writeFile(wb, '出勤分析结果.xlsx');
        }
    </script>
</body>
</html>
